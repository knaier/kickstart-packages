# python 3.13.14 — relocatable, self-contained CPython (python-build-standalone).
# A runtime/tool (no daemon block): services declare it as a dependency and run
# the PACKAGED interpreter instead of the box python. The archive has several
# `python.exe`, so `bin` is a SUBPATH (joined directly, not searched).

targets:
  windows/x86_64:
    url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260610/cpython-3.13.14+20260610-x86_64-pc-windows-msvc-install_only.tar.gz"
    sha256: "9a77f87ec431f16e79fc7e90d9115edf187d18b64100b6f6c27189f419fd79be"
    archive: tar_gz
    bin: "python/python.exe"
  # No native Windows-ARM build pinned; x86_64 runs under x64 emulation.
  windows/aarch64:
    url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260610/cpython-3.13.14+20260610-x86_64-pc-windows-msvc-install_only.tar.gz"
    sha256: "9a77f87ec431f16e79fc7e90d9115edf187d18b64100b6f6c27189f419fd79be"
    archive: tar_gz
    bin: "python/python.exe"
  linux/x86_64:
    url: "https://github.com/astral-sh/python-build-standalone/releases/download/20260610/cpython-3.13.14+20260610-x86_64-unknown-linux-gnu-install_only.tar.gz"
    sha256: "31ebbb024fecb446d7f25a5b59ca1d4955597ca3f5b4b76f55b30a8987eb61c9"
    archive: tar_gz
    bin: "python/bin/python3"
