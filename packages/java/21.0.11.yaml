# OpenJDK 21.0.11 (Eclipse Temurin, HotSpot) - relocatable, self-contained JDK.
# A runtime/tool (no daemon block): services declare it as a dependency and run
# the PACKAGED `java` instead of the box JDK. The archive unpacks to a top-level
# `jdk-21.0.11+10/` dir, so `bin` is a SUBPATH (joined directly, not searched). JAVA_HOME
# is the dir two levels up from `${pkg.java}` if a service needs it.

targets:
  windows/x86_64:
    url: "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_windows_hotspot_21.0.11_10.zip"
    sha256: "d3625e7cadf23787ea540229544b6e2ab494b3b54da1801879e583e1dfee0a64"
    archive: zip
    bin: "jdk-21.0.11+10/bin/java.exe"
  # No native Windows-ARM build pinned; x86_64 runs under x64 emulation.
  windows/aarch64:
    url: "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_windows_hotspot_21.0.11_10.zip"
    sha256: "d3625e7cadf23787ea540229544b6e2ab494b3b54da1801879e583e1dfee0a64"
    archive: zip
    bin: "jdk-21.0.11+10/bin/java.exe"
  linux/x86_64:
    url: "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz"
    sha256: "4b2220e232a97997b436ca6ab15cbf70171ecff52958a46159dfa5a8c44ca4de"
    archive: tar_gz
    bin: "jdk-21.0.11+10/bin/java"
