# OpenJDK 11.0.31 (Eclipse Temurin, HotSpot) - relocatable, self-contained JDK.
# A runtime/tool (no daemon block): services declare it as a dependency and run
# the PACKAGED `java` instead of the box JDK. The archive unpacks to a top-level
# `jdk-11.0.31+11/` dir, so `bin` is a SUBPATH (joined directly, not searched). JAVA_HOME
# is the dir two levels up from `${pkg.java}` if a service needs it.

targets:
  windows/x86_64:
    url: "https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31%2B11/OpenJDK11U-jdk_x64_windows_hotspot_11.0.31_11.zip"
    sha256: "5695bd8fed700acb74e0c13945fc6d7564441a31d345c100b82ee1aac553a6b7"
    archive: zip
    bin: "jdk-11.0.31+11/bin/java.exe"
  # No native Windows-ARM build pinned; x86_64 runs under x64 emulation.
  windows/aarch64:
    url: "https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31%2B11/OpenJDK11U-jdk_x64_windows_hotspot_11.0.31_11.zip"
    sha256: "5695bd8fed700acb74e0c13945fc6d7564441a31d345c100b82ee1aac553a6b7"
    archive: zip
    bin: "jdk-11.0.31+11/bin/java.exe"
  linux/x86_64:
    url: "https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31%2B11/OpenJDK11U-jdk_x64_linux_hotspot_11.0.31_11.tar.gz"
    sha256: "1e9de64586b519c0a981319489257cabedd9457599f3823424a87c3158fbe939"
    archive: tar_gz
    bin: "jdk-11.0.31+11/bin/java"
