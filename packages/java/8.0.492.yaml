# OpenJDK 8.0.492 (Eclipse Temurin, HotSpot) - relocatable, self-contained JDK.
# A runtime/tool (no daemon block): services declare it as a dependency and run
# the PACKAGED `java` instead of the box JDK. The archive unpacks to a top-level
# `jdk8u492-b09/` dir, so `bin` is a SUBPATH (joined directly, not searched). JAVA_HOME
# is the dir two levels up from `${pkg.java}` if a service needs it.

targets:
  windows/x86_64:
    url: "https://github.com/adoptium/temurin8-binaries/releases/download/jdk8u492-b09/OpenJDK8U-jdk_x64_windows_hotspot_8u492b09.zip"
    sha256: "1e33881ea6bfc1c532e3eaad1c1de7777169c0c1333e2b880621e0e0a16073b2"
    archive: zip
    bin: "jdk8u492-b09/bin/java.exe"
  # No native Windows-ARM build pinned; x86_64 runs under x64 emulation.
  windows/aarch64:
    url: "https://github.com/adoptium/temurin8-binaries/releases/download/jdk8u492-b09/OpenJDK8U-jdk_x64_windows_hotspot_8u492b09.zip"
    sha256: "1e33881ea6bfc1c532e3eaad1c1de7777169c0c1333e2b880621e0e0a16073b2"
    archive: zip
    bin: "jdk8u492-b09/bin/java.exe"
  linux/x86_64:
    url: "https://github.com/adoptium/temurin8-binaries/releases/download/jdk8u492-b09/OpenJDK8U-jdk_x64_linux_hotspot_8u492b09.tar.gz"
    sha256: "da257f161d7f8c6ca5b0e5d9e4090f65ac28c5e398072e68b8ae87988b1d1a2e"
    archive: tar_gz
    bin: "jdk8u492-b09/bin/java"
