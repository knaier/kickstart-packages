# OpenJDK 17.0.19 (Eclipse Temurin, HotSpot) - relocatable, self-contained JDK.
# A runtime/tool (no daemon block): services declare it as a dependency and run
# the PACKAGED `java` instead of the box JDK. The archive unpacks to a top-level
# `jdk-17.0.19+10/` dir, so `bin` is a SUBPATH (joined directly, not searched). JAVA_HOME
# is the dir two levels up from `${pkg.java}` if a service needs it.

targets:
  windows/x86_64:
    url: "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_windows_hotspot_17.0.19_10.zip"
    sha256: "b5b235c48adf6a081874b812c630b9f4b5f637b7a5ed18b9174d08a41ec4c235"
    archive: zip
    bin: "jdk-17.0.19+10/bin/java.exe"
  # No native Windows-ARM build pinned; x86_64 runs under x64 emulation.
  windows/aarch64:
    url: "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_windows_hotspot_17.0.19_10.zip"
    sha256: "b5b235c48adf6a081874b812c630b9f4b5f637b7a5ed18b9174d08a41ec4c235"
    archive: zip
    bin: "jdk-17.0.19+10/bin/java.exe"
  linux/x86_64:
    url: "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz"
    sha256: "d8afc263758141a66e0e3aafc321e783f7016696f4eaea067d340a269037d331"
    archive: tar_gz
    bin: "jdk-17.0.19+10/bin/java"
